<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de Inventario Web - Titan Gym, Paicol, Huila">
  <title>ingreso Inventario Titan Gym</title>
  <link rel="icon" type="image/jpeg" href="img/480122487_2407748876249002_7178200603983230297_n.jpg">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="login-container">

    <div class="login-box">

      <div class="login-header">
        <div class="logo-login">
           <img src="img/480122487_2407748876249002_7178200603983230297_n.jpg" alt="Logo Titan Gym" class="logo-img" width="100" height="100">
          <h1>Titan Gym</h1>
        </div>
        <p class="login-subtitle">Sistema de Inventario Web</p>
      </div>

      <form class="login-form">

        <h2>Iniciar Sesión</h2>
        <p class="form-descripcion">Ingrese tus credenciales de administrador</p>

        <div class="form-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
        </div>

        <button type="submit" class="btn-login">Ingresar al Sistema </button>



      </form>



    </div>

  </div>

</body>
</html>
